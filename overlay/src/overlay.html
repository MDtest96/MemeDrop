<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MemeDrop overlay</title>
  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    /* ── Thèmes ────────────────────────────────────────────────────────
       --accent-a/--accent-b pilotent le dégradé de la bulle avatar (et son
       libellé). "classique" reprend les couleurs historiques de l'overlay. */
    :root, html[data-theme="classic"] {
      --accent-a: #ff5e8a;
      --accent-b: #ffb45e;
    }
    html[data-theme="neon"] {
      --accent-a: #7c3aed;
      --accent-b: #22d3ee;
    }
    html[data-theme="fire"] {
      --accent-a: #ef4444;
      --accent-b: #facc15;
    }
    html[data-theme="mono"] {
      --accent-a: #6b7280;
      --accent-b: #d1d5db;
    }

    #stage {
      position: fixed; inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .anchor {
      position: absolute;
      width: 0; height: 0;
    }

    .drop {
      position: absolute;
      left: 0; top: 0;
      transform-origin: center;
      will-change: transform, opacity;
      filter:
        drop-shadow(0 30px 60px rgba(0,0,0,.55))
        drop-shadow(0 6px 12px rgba(0,0,0,.4));
      opacity: 0;
      animation:
        drop-in   420ms cubic-bezier(.18,1.2,.4,1) forwards,
        drop-bob  3s ease-in-out 420ms infinite;
    }

    .drop.leaving {
      animation: drop-out 380ms cubic-bezier(.5,0,.75,0) forwards;
    }

    /* Fermeture manuelle (croix) — fondu doux, sans la chute de drop-out */
    .drop.closing {
      animation: drop-close-out 220ms cubic-bezier(.4,0,.2,1) forwards;
    }

    .media-box {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .drop img,
    .drop video,
    .media-box > div > svg,
    .media-box > div > div > svg {
      display: block;
      max-width: 38vw;
      max-height: 50vh;
      width: auto;
      height: auto;
      border-radius: 14px;
      background: #000;
    }

    /* Avatar bubble for image/video drops — overlaps top of media */
    .avatar-bubble {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background:
        linear-gradient(135deg, var(--accent-a) 0%, var(--accent-b) 100%) padding-box,
        linear-gradient(135deg, var(--accent-a) 0%, var(--accent-b) 100%) border-box;
      padding: 3px;
      box-shadow:
        0 8px 22px rgba(0,0,0,.5),
        0 2px 6px rgba(0,0,0,.3);
      z-index: 3;
    }
    .avatar-bubble img {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: #1a1226;
    }
    .avatar-bubble::after {
      content: attr(data-username);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translate(-50%, 4px);
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .02em;
      color: #fff;
      background: rgba(0,0,0,.7);
      border-radius: 999px;
      white-space: nowrap;
      box-shadow: 0 4px 10px rgba(0,0,0,.35);
    }

    /* Bouton fermer — coin haut-droit, discret, visible au survol du drop */
    .drop-close {
      position: absolute;
      top: -16px;
      right: -16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,.85);
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      line-height: 1;
      font-family: ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(.7);
      transition: opacity 120ms ease, transform 120ms ease, background 120ms ease;
      z-index: 4;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    /* L'overlay est click-through (forward:true) : :hover n'est pas fiable,
       donc overlay.js bascule manuellement la classe .hover via le sondage
       du curseur fait dans le main process. */
    .drop.hover .drop-close {
      opacity: 1;
      transform: scale(1);
    }
    .drop-close:hover {
      background: rgba(255,60,90,.9);
    }

    /* Caption — subtitle bar at bottom of media (image/video only) */
    .caption-bar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      box-sizing: border-box;
      width: 100%;
      padding: 10px 14px 14px;
      font-family: 'Impact', 'Arial Black', 'Anton', system-ui, sans-serif;
      font-weight: 900;
      font-size: clamp(18px, 2.6vw, 40px);
      line-height: 1.08;
      letter-spacing: .01em;
      text-transform: uppercase;
      text-align: center;
      color: #fff;
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      -webkit-text-stroke: 2px #000;
      paint-order: stroke fill;
      text-shadow:
        0 2px 4px rgba(0,0,0,.9),
        0 0 10px rgba(0,0,0,.7);
      background: linear-gradient(to top,
        rgba(0,0,0,.65) 0%,
        rgba(0,0,0,.35) 55%,
        rgba(0,0,0,0) 100%);
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      z-index: 2;
      animation: caption-rise 420ms cubic-bezier(.18,1.1,.4,1) 160ms backwards;
    }

    /* ──────────────────────────────────────────────────────────────────
       Audio toast — minimalist, top-center, no card / no background.
       Just the avatar bubble + small username + optional caption with
       text-shadows so it stays readable over any game UI.
       ────────────────────────────────────────────────────────────────── */
    .audio-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      animation:
        audio-in   320ms cubic-bezier(.18,1.2,.4,1) forwards;
    }
    .audio-toast.leaving {
      animation: audio-out 280ms cubic-bezier(.5,0,.75,0) forwards;
    }

    .audio-toast .avatar-bubble {
      position: relative;
      top: auto; left: auto;
      transform: none;
      width: 44px;
      height: 44px;
    }
    /* Smaller pill label for the audio variant */
    .audio-toast .avatar-bubble::after {
      font-size: 10px;
      padding: 2px 7px;
      transform: translate(-50%, 3px);
    }

    .audio-caption {
      max-width: 70vw;
      text-align: center;
      font-family: 'Impact', 'Arial Black', 'Anton', system-ui, sans-serif;
      font-weight: 900;
      font-size: clamp(14px, 1.6vw, 22px);
      line-height: 1.1;
      letter-spacing: .02em;
      text-transform: uppercase;
      color: #fff;
      -webkit-text-stroke: 1.5px #000;
      paint-order: stroke fill;
      text-shadow:
        0 2px 4px rgba(0,0,0,.9),
        0 0 8px rgba(0,0,0,.7);
      word-break: break-word;
      overflow-wrap: anywhere;
      margin-top: 12px;     /* room for the avatar's pill label */
    }

    @keyframes drop-in {
      0%   { opacity: 0; transform: translate(-50%, calc(-50% - 80px)) rotate(-8deg) scale(.6); }
      60%  { opacity: 1; transform: translate(-50%, calc(-50% + 12px)) rotate( 2deg) scale(1.04); }
      100% { opacity: 1; transform: translate(-50%, -50%)              rotate( 0deg) scale(1);    }
    }
    @keyframes drop-bob {
      0%, 100% { transform: translate(-50%, -50%)             rotate(0deg); }
      50%      { transform: translate(-50%, calc(-50% - 6px)) rotate(.6deg); }
    }
    @keyframes drop-out {
      to { opacity: 0; transform: translate(-50%, calc(-50% + 40px)) rotate(6deg) scale(.92); }
    }
    @keyframes drop-close-out {
      to { opacity: 0; transform: translate(-50%, -50%) scale(.85); }
    }
    @keyframes caption-rise {
      0%   { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes audio-in {
      0%   { opacity: 0; transform: translate(-50%, -20px); }
      100% { opacity: 1; transform: translate(-50%, 0);     }
    }
    @keyframes audio-out {
      to { opacity: 0; transform: translate(-50%, -16px); }
    }

    /* ── Spotlight ─────────────────────────────────────────────────────
       Voile sombre sur tout l'écran avec un trou transparent centré sur
       le drop actif. Position mise à jour via custom properties --cx/--cy
       et --rx/--ry par requestAnimationFrame dans overlay.js.
       ────────────────────────────────────────────────────────────────── */
    #spotlight {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(
        ellipse var(--rx, 240px) var(--ry, 240px) at var(--cx, 50%) var(--cy, 50%),
        transparent 0%,
        transparent 35%,
        rgba(0, 0, 0, 0.78) 100%
      );
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    /* ── Pluie d'émojis ────────────────────────────────────────────────
       Chaque particule est positionnée aléatoirement en JS et tombe
       verticalement avec une légère dérive horizontale (--sway).
       ────────────────────────────────────────────────────────────────── */
    .rain-emoji {
      position: fixed;
      top: -64px;
      pointer-events: none;
      user-select: none;
      z-index: 9999;
      line-height: 1;
      will-change: transform, opacity;
      animation: rain-fall linear forwards;
    }
    @keyframes rain-fall {
      0%   { transform: translateY(0)     translateX(0)           rotate(0deg);   opacity: .95; }
      15%  { opacity: .95; }
      85%  { opacity: .9; }
      100% { transform: translateY(115vh) translateX(var(--sway)) rotate(var(--rot)); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="spotlight"></div>
  <div id="stage"></div>
  <script src="./overlay.js"></script>
</body>
</html>
